<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Firefighter Cardiac Diagnoses</title>

<style>

:root{
  --page-w:8in;
  --page-h:10in;

  --left-col:1.65in;
  --right-col:0.72in;

  --row-gap:0.055in;
  --row-pad-y:0.045in;
  --row-pad-x:0.10in;

  --grid:#dde5ee;
  --row-bg:#f6f8fb;
  --row-border:#e8edf3;
  --connector:#cfd7e3;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#fff;
}

body{
  display:flex;
  justify-content:center;
}

.wrap{
  width:var(--page-w);
  height:var(--page-h);
  padding:.10in .10in .08in;
  overflow:hidden;
}

/* ---------- LEGEND FIX ---------- */

.legend{
  display:grid;
  grid-template-columns:var(--left-col) 1fr var(--right-col);
  margin-bottom:.05in;
}

.legend-center{
  grid-column:2;
  display:flex;
  justify-content:center;
  gap:.30in;
  font-weight:700;
  font-size:12px;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:6px;
}

.legend-dot{
  width:14px;
  height:14px;
  border-radius:50%;
}

.male{background:linear-gradient(135deg,#8bd1ff,#1565c0)}
.female{background:linear-gradient(135deg,#ffb1b1,#c62828)}

/* ---------- AXIS ---------- */

.axis-head{
  display:grid;
  grid-template-columns:var(--left-col) 1fr var(--right-col);
  column-gap:.08in;
  font-weight:700;
  margin-bottom:.03in;
}

.axis-title-left{
  text-align:right;
  padding-right:.05in;
  font-size:10px;
}

.axis-title-right{
  text-align:left;
  font-size:10px;
}

.axis-scale{
  position:relative;
  height:15px;
  font-size:9px;
}

.axis-scale span{
  position:absolute;
  transform:translateX(-50%);
}

.axis-scale span.first{
  left:0;
  transform:none;
}

.axis-scale span.last{
  left:100%;
  transform:translateX(-100%);
}

/* ---------- CHART ---------- */

.chart-body{
  display:flex;
  flex-direction:column;
  gap:var(--row-gap);
}

.row{
  display:grid;
  grid-template-columns:var(--left-col) 1fr var(--right-col);
  column-gap:.08in;
  align-items:center;
}

.label{
  text-align:right;
  padding-right:.05in;
  font-weight:700;
  font-size:11px;
}

.row-card{
  background:var(--row-bg);
  border:1px solid var(--row-border);
  border-radius:12px;
  padding:var(--row-pad-y) var(--row-pad-x);
}

.plot{
  position:relative;
  height:30px;
}

/* gridlines */

.gridline{
  position:absolute;
  top:1px;
  bottom:1px;
  width:1px;
  background:var(--grid);
}

.gridline.mid{transform:translateX(-50%)}

.gridline.first{left:0}

.gridline.last{
  left:100%;
  transform:translateX(-100%);
}

/* dumbbell */

.connector{
  position:absolute;
  top:50%;
  height:3px;
  background:var(--connector);
  transform:translateY(-50%);
  border-radius:999px;
}

.point{
  position:absolute;
  top:50%;
  width:11px;
  height:11px;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.pill{
  position:absolute;
  min-width:22px;
  padding:1px 5px;
  border-radius:999px;
  background:#fff;
  font-size:8px;
  font-weight:700;
  transform:translateX(-50%);
  box-shadow:0 1px 2px rgba(0,0,0,.08);
}

.male-label{color:#1565c0}
.female-label{color:#c62828}

.diff{
  font-size:8.5px;
  font-weight:600;
}

@page{
  size:8in 10in;
  margin:0;
}

</style>
</head>

<body>

<div class="wrap">

<div class="legend">
<div></div>

<div class="legend-center">
<div class="legend-item">
<span class="legend-dot male"></span>
Firefighters &lt;40
</div>

<div class="legend-item">
<span class="legend-dot female"></span>
Firefighters ≥40
</div>
</div>

<div></div>
</div>

<div class="axis-head">

<div class="axis-title-left">Diagnosis</div>

<div class="axis-scale">
<span class="first" style="left:0%">0%</span>
<span style="left:20%">20%</span>
<span style="left:40%">40%</span>
<span style="left:60%">60%</span>
<span style="left:80%">80%</span>
<span class="last" style="left:100%">100%</span>
</div>

<div class="axis-title-right">Difference</div>

</div>

<div class="chart-body" id="chart"></div>

</div>

<script>

const data=[
{label:'CAD/Ischemic',male:48,female:83.2},
{label:'Valvular',male:10,female:0.8},
{label:'iLVH',male:12,female:5.3},
{label:'CM NOS',male:6,female:0},
{label:'Aortic',male:4,female:2},
{label:'Mitral',male:6,female:2},
{label:'Arrhythmia',male:20,female:17.9},
{label:'Myocarditis',male:4,female:0.8},
{label:'Pericarditis',male:2,female:0.8},
{label:'Congenital',male:4,female:2},
{label:'Other',male:14,female:13.4},
{label:'Normal',male:48,female:32.4}
]

const chart=document.getElementById("chart")
const ticks=[0,20,40,60,80,100]

const pct=v=>v+"%"

data.forEach(d=>{

const diff=Math.abs((d.female-d.male).toFixed(1))
const left=Math.min(d.male,d.female)
const width=Math.abs(d.female-d.male)

const grid=ticks.map((v,i)=>{

let cls="gridline mid"
if(i===0)cls="gridline first"
if(i===ticks.length-1)cls="gridline last"

return `<div class="${cls}" style="left:${pct(v)}"></div>`

}).join("")

const row=document.createElement("div")
row.className="row"

row.innerHTML=`

<div class="label">${d.label}</div>

<div class="row-card">
<div class="plot">

${grid}

<div class="connector" style="left:${pct(left)};width:${pct(width)}"></div>

<div class="pill male-label" style="left:${pct(d.male)};top:18px">${d.male}</div>
<div class="pill female-label" style="left:${pct(d.female)};top:-2px">${d.female}</div>

<div class="point male" style="left:${pct(d.male)};background:#1565c0"></div>
<div class="point female" style="left:${pct(d.female)};background:#c62828"></div>

</div>
</div>

<div class="diff">${diff} pts</div>
`

chart.appendChild(row)

})

</script>

</body>
</html>
