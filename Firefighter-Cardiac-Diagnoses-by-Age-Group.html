<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dumbbell Chart</title>

<style>

:root{
--grid:#e8edf3;
--track:#d3dbe5;
--male1:#8bd1ff;
--male2:#1565c0;
--female1:#ffb1b1;
--female2:#c62828;
--maleText:#1565c0;
--femaleText:#c62828;

--left:190px;
--plot:850px;
--right:120px;
}

body{
margin:40px;
font-family:Arial,Helvetica,sans-serif;
color:#18324a;
background:#ffffff;
}

.legend{
display:flex;
gap:40px;
justify-content:center;
font-weight:700;
margin-bottom:20px;
}

.legend-dot{
width:18px;
height:18px;
border-radius:50%;
display:inline-block;
margin-right:8px;
}

.male-dot{
background:linear-gradient(135deg,var(--male1),var(--male2));
}

.female-dot{
background:linear-gradient(135deg,var(--female1),var(--female2));
}

.axis{
display:grid;
grid-template-columns:var(--left) var(--plot) var(--right);
align-items:center;
margin-bottom:10px;
font-weight:700;
}

.scale{
display:grid;
grid-template-columns:repeat(6,1fr);
font-size:13px;
color:#5f7288;
text-align:center;
}

.chart{
display:flex;
flex-direction:column;
gap:16px;
}

.row{
display:grid;
grid-template-columns:var(--left) var(--plot) var(--right);
align-items:center;
}

.label{
text-align:right;
font-weight:700;
font-size:17px;
padding-right:10px;
}

.plot{
position:relative;
height:40px;
}

.connector{
position:absolute;
top:50%;
height:6px;
transform:translateY(-50%);
border-radius:999px;
background:var(--track);
}

.point{
position:absolute;
top:50%;
width:16px;
height:16px;
border-radius:50%;
margin-left:-8px;
transform:translateY(-50%);
}

.male{
background:linear-gradient(135deg,var(--male1),var(--male2));
}

.female{
background:linear-gradient(135deg,var(--female1),var(--female2));
}

.pill{
position:absolute;
top:-16px;
transform:translateX(-50%);
background:#fff;
padding:2px 8px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.pill.male{
color:var(--maleText);
}

.pill.female{
color:var(--femaleText);
}

.diff{
text-align:right;
font-weight:700;
font-size:14px;
}

</style>
</head>

<body>

<div class="legend">
<div><span class="legend-dot male-dot"></span>Firefighters &lt;40</div>
<div><span class="legend-dot female-dot"></span>Firefighters ≥40</div>
</div>

<div class="axis">
<div style="text-align:center">Diagnosis</div>

<div class="scale">
<div>0%</div>
<div>20%</div>
<div>40%</div>
<div>60%</div>
<div>80%</div>
<div>100%</div>
</div>

<div style="text-align:right">Difference</div>
</div>

<div class="chart" id="chart"></div>

<script>

const data=[
{label:'CAD/Ischemic',male:48,female:83.2},
{label:'Valvular',male:10,female:0.8},
{label:'iLVH',male:12,female:5.3},
{label:'CM NOS',male:6,female:0},
{label:'Aortic',male:4,female:2},
{label:'Mitral',male:6,female:2},
{label:'Arrhythmia',male:20,female:17.9},
{label:'Myocarditis',male:4,female:0.8},
{label:'Pericarditis',male:2,female:0.8},
{label:'Congenital',male:4,female:2},
{label:'Other',male:14,female:13.4},
{label:'Normal',male:48,female:32.4}
]

const chart=document.getElementById('chart')

const pct=v=>`${v}%`

data.forEach(d=>{

const row=document.createElement('div')
row.className='row'

const diff=Math.abs(d.female-d.male).toFixed(1)

const left=Math.min(d.male,d.female)
const width=Math.abs(d.female-d.male)

row.innerHTML=`

<div class="label">${d.label}</div>

<div class="plot">

<div class="connector"
style="left:${pct(left)};width:${pct(width)};"></div>

<div class="pill male" style="left:${pct(d.male)}">${d.male.toFixed(1)}</div>
<div class="pill female" style="left:${pct(d.female)}">${d.female.toFixed(1)}</div>

<div class="point male" style="left:${pct(d.male)}"></div>
<div class="point female" style="left:${pct(d.female)}"></div>

</div>

<div class="diff">${diff}</div>
`

chart.appendChild(row)

})

</script>

</body>
</html>
