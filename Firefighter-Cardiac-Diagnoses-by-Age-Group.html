\<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firefighter Cardiac Diagnoses by Age Group</title>

<style>

:root{
  --page-w:10in;
  --page-h:8in;

  --left-col:2in;
  --right-col:0.9in;

  --row-gap:0.07in;
  --row-pad-y:0.05in;
  --row-pad-x:0.12in;

  --grid:#dde5ee;
  --row-bg:#f6f8fb;
  --row-border:#e8edf3;
  --connector:#cfd7e3;
  --axis:#5f7288;
  --axis-head:#4b5d73;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:#ffffff;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.wrap{
  width:10in;
  height:8in;
  padding:0.12in;
  background:#fff;
}

.legend{
  display:flex;
  justify-content:center;
  gap:0.45in;
  margin-bottom:0.08in;
  font-weight:700;
  font-size:14px;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:8px;
}

.legend-dot{
  width:16px;
  height:16px;
  border-radius:50%;
}

.male{background:linear-gradient(135deg,#8bd1ff,#1565c0)}
.female{background:linear-gradient(135deg,#ffb1b1,#c62828)}

.axis-head{
  display:grid;
  grid-template-columns:var(--left-col) 1fr var(--right-col);
  column-gap:0.14in;
  margin-bottom:0.05in;
  font-weight:700;
  color:var(--axis-head);
}

.axis-title-left{
  text-align:right;
  padding-right:0.12in;
}

.axis-title-right{
  text-align:left;
}

.axis-scale{
  position:relative;
  height:20px;
  color:var(--axis);
}

.axis-scale span{
  position:absolute;
  transform:translateX(-50%);
  font-size:12px;
}

.axis-scale span.first{
  left:0;
  transform:none;
}

.axis-scale span.last{
  left:100%;
  transform:translateX(-100%);
}

.chart-body{
  display:flex;
  flex-direction:column;
  gap:var(--row-gap);
}

.row{
  display:grid;
  grid-template-columns:var(--left-col) 1fr var(--right-col);
  column-gap:0.14in;
  align-items:center;
}

.label{
  text-align:right;
  padding-right:0.12in;
  font-weight:700;
  font-size:15px;
}

.row-card{
  background:var(--row-bg);
  border:1px solid var(--row-border);
  border-radius:18px;
  padding:var(--row-pad-y) var(--row-pad-x);
}

.plot{
  position:relative;
  height:50px;
}

.gridline{
  position:absolute;
  top:3px;
  bottom:3px;
  width:1px;
  background:var(--grid);
}

.gridline.mid{transform:translateX(-50%)}
.gridline.first{left:0}
.gridline.last{left:100%;transform:translateX(-100%)}

.connector{
  position:absolute;
  top:50%;
  height:5px;
  background:var(--connector);
  transform:translateY(-50%);
  border-radius:999px;
}

.point{
  position:absolute;
  top:50%;
  width:15px;
  height:15px;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.pill{
  position:absolute;
  min-width:32px;
  padding:2px 7px;
  border-radius:999px;
  background:#fff;
  font-size:11px;
  font-weight:700;
  transform:translateX(-50%);
  box-shadow:0 1px 2px rgba(0,0,0,0.08);
}

.pill.male-label{color:#1565c0}
.pill.female-label{color:#c62828}

.diff{
  font-size:12px;
  font-weight:600;
}

@media print{

html,body{
  width:10in;
  height:8in;
}

.wrap{
  width:10in;
  height:8in;
  padding:0.12in;
}

}

@page{
  size:10in 8in;
  margin:0;
}

</style>
</head>

<body>

<div class="wrap">

<div class="legend">
  <div class="legend-item">
    <span class="legend-dot male"></span>Firefighters &lt;40
  </div>
  <div class="legend-item">
    <span class="legend-dot female"></span>Firefighters ≥40
  </div>
</div>

<div class="axis-head">
  <div class="axis-title-left">Diagnosis</div>

  <div class="axis-scale">
    <span class="first" style="left:0%">0%</span>
    <span style="left:20%">20%</span>
    <span style="left:40%">40%</span>
    <span style="left:60%">60%</span>
    <span style="left:80%">80%</span>
    <span class="last" style="left:100%">100%</span>
  </div>

  <div class="axis-title-right">Difference</div>
</div>

<div class="chart-body" id="chart"></div>

</div>

<script>

const data=[
{label:'CAD/Ischemic',male:48,female:83.2},
{label:'Valvular',male:10,female:0.8},
{label:'iLVH',male:12,female:5.3},
{label:'CM NOS',male:6,female:0},
{label:'Aortic',male:4,female:2},
{label:'Mitral',male:6,female:2},
{label:'Arrhythmia',male:20,female:17.9},
{label:'Myocarditis',male:4,female:0.8},
{label:'Pericarditis',male:2,female:0.8},
{label:'Congenital',male:4,female:2},
{label:'Other',male:14,female:13.4},
{label:'Normal',male:48,female:32.4}
]

const chart=document.getElementById("chart")

const ticks=[0,20,40,60,80,100]

const pct=v=>`${v}%`

data.forEach(d=>{

const diff=Math.abs((d.female-d.male).toFixed(1))

const left=Math.min(d.male,d.female)
const width=Math.abs(d.female-d.male)

const femaleTop=-2
const maleTop=32

const grid=ticks.map((v,i)=>{

let c="gridline mid"

if(i===0)c="gridline first"
if(i===ticks.length-1)c="gridline last"

return `<div class="${c}" style="left:${pct(v)}"></div>`

}).join("")

const row=document.createElement("div")
row.className="row"

row.innerHTML=`

<div class="label">${d.label}</div>

<div class="row-card">
<div class="plot">

${grid}

<div class="connector" style="left:${pct(left)};width:${pct(width)}"></div>

<div class="pill female-label" style="left:${pct(d.female)};top:${femaleTop}px">${d.female}</div>

<div class="pill male-label" style="left:${pct(d.male)};top:${maleTop}px">${d.male}</div>

<div class="point male" style="left:${pct(d.male)}"></div>

<div class="point female" style="left:${pct(d.female)}"></div>

</div>
</div>

<div class="diff">${diff} pts</div>

`

chart.appendChild(row)

})

</script>

</body>
</html>
