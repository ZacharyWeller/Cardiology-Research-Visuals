<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dumbbell Chart Template</title>

  <style>
    /*
      ============================================================
      DUMBBELL CHART TEMPLATE
      ------------------------------------------------------------
      HOW TO EDIT:
      1. Change colors / spacing in :root
      2. Change labels and values in the DATA array in <script>
      3. Change axis scale in CONFIG in <script>
      4. Open in browser and screenshot/export
      ============================================================
    */

    :root {
      /* General page */
      --page-bg: #ffffff;
      --text: #18324a;
      --muted: #6b7f93;

      /* Chart structure */
      --grid: #e8edf3;
      --row-bg: #f6f8fb;
      --row-border: #e8edf3;
      --connector: #d3dbe5;

      /* Series colors */
      --series-a-1: #8bd1ff;
      --series-a-2: #1565c0;
      --series-b-1: #ffb1b1;
      --series-b-2: #c62828;
      --series-a-text: #1565c0;
      --series-b-text: #c62828;

      /* Shadows */
      --shadow-sm: 0 3px 10px rgba(100, 116, 139, 0.10);

      /* Layout widths */
      --left-col: 190px;   /* category labels */
      --plot-w: 850px;     /* plotting area */
      --right-col: 140px;  /* difference column */

      /* Row sizing */
      --row-h: 45px;
      --row-gap: 12px;
      --row-card-radius: 18px;
      --pill-radius: 999px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page-bg);
      color: var(--text);
    }

    .wrap {
      width: min(1400px, 100%);
      margin: 0 auto;
      padding: 32px 28px 40px;
    }

    .title {
      text-align: center;
      font-size: 34px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 17px;
      color: var(--muted);
      margin: 0 0 22px;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 48px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      font-size: 16px;
      font-weight: 700;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      box-shadow: var(--shadow-sm);
      flex: 0 0 auto;
    }

    .legend-dot.series-a {
      background: linear-gradient(135deg, var(--series-a-1), var(--series-a-2));
    }

    .legend-dot.series-b {
      background: linear-gradient(135deg, var(--series-b-1), var(--series-b-2));
    }

    .legend-item.series-a { color: var(--series-a-text); }
    .legend-item.series-b { color: var(--series-b-text); }

    .chart-shell {
      overflow: visible;
    }

    .chart-shell-inner {
      min-width: auto;
    }

    .axis-head,
    .row {
      min-height: var(--row-h);
      position: relative;
      display: grid;
      grid-template-columns: var(--left-col) var(--plot-w) var(--right-col);
      align-items: center;
      gap: 20px;
    }

    .axis-head {
      margin-bottom: 14px;
      padding: 10px 16px 12px;
      font-size: 15px;
    }

    .axis-label-left,
    .axis-label-right {
      font-size: 16px;
      font-weight: 700;
      color: #4b5d73;
    }

    .axis-label-left { text-align: center; }
    .axis-label-right { text-align: right; }

    .axis-scale {
      position: relative;
      height: 40px;
      display: grid;
      align-items: end;
      font-weight: 700;
      color: #4b5d73;
    }

    .axis-tick {
      position: relative;
      text-align: center;
      font-size: 13px;
      color: #5f7288;
      padding-bottom: 4px;
    }

    /* Vertical grid lines extending down through chart body */
    .axis-tick::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 1.5px;
      height: var(--gridline-height, 560px);
      transform: translateX(-50%);
      background: var(--grid);
      z-index: 0;
    }

    .chart-body {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: var(--row-gap);
      margin-top: 6px;
    }

    .row-card {
      grid-column: 2 / 3;
      display: grid;
      grid-template-columns: var(--plot-w);
      align-items: center;
      padding: 12px 16px;
      background: var(--row-bg);
      border: 1px solid var(--row-border);
      border-radius: var(--row-card-radius);
    }

    .label {
      text-align: right;
      font-size: 18px;
      font-weight: 700;
      color: #243746;
      padding-right: 10px;
      white-space: nowrap;
    }

    .plot {
      position: relative;
      height: 52px;
    }

    .connector {
      position: absolute;
      top: 50%;
      height: 8px;
      transform: translateY(-50%);
      border-radius: var(--pill-radius);
      background: var(--connector);
      z-index: 1;
    }

    .point {
      position: absolute;
      top: 50%;
      width: 20px;
      height: 20px;
      margin-left: -10px;
      transform: translateY(-50%);
      border-radius: 50%;
      box-shadow: var(--shadow-sm);
      z-index: 3;
    }

    .point.series-a {
      background: linear-gradient(135deg, var(--series-a-1), var(--series-a-2));
    }

    .point.series-b {
      background: linear-gradient(135deg, var(--series-b-1), var(--series-b-2));
    }

    .pill {
      position: absolute;
      top: 50%;
      min-width: 46px;
      height: 22px;
      padding: 0 10px;
      border-radius: var(--pill-radius);
      background: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 22px;
      text-align: center;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      z-index: 4;
      white-space: nowrap;
      pointer-events: none;
    }

    .pill.series-a { color: var(--series-a-text); }
    .pill.series-b { color: var(--series-b-text); }

    .diff {
      text-align: right;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      color: #18324a;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 1280px) {
      :root {
        --left-col: 170px;
        --plot-w: 720px;
        --right-col: 120px;
      }

      .chart-shell {
        overflow-x: auto;
      }

      .chart-shell-inner {
        min-width: 1050px;
      }
    }

    @media (max-width: 760px) {
      .wrap {
        padding: 24px 14px 28px;
      }

      .title {
        font-size: 28px;
      }

      .subtitle {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Title / subtitle are populated from CONFIG -->
    <h1 class="title" id="chartTitle"></h1>
    <p class="subtitle" id="chartSubtitle"></p>

    <!-- Legend is populated from CONFIG -->
    <div class="legend" aria-label="Legend" id="legend"></div>

    <div class="chart-shell">
      <div class="chart-shell-inner">
        <div class="axis-head">
          <div class="axis-label-left" id="leftHeader"></div>
          <div class="axis-scale" id="axisScale"></div>
          <div class="axis-label-right" id="rightHeader"></div>
        </div>

        <div class="chart-body" id="chart"></div>
      </div>
    </div>

    <div class="footer-note" id="footerNote"></div>
  </div>

  <script>
    /*
      ============================================================
      CONFIG SECTION
      ------------------------------------------------------------
      Edit these values first when reusing the template
      ============================================================
    */
    const CONFIG = {
      title: "Cardiac Diagnoses by Age Group",
      subtitle: "Dumbbell chart comparison of firefighters <40 vs ≥40",
      leftHeader: "Diagnosis",
      rightHeader: "Difference",
      footerNote: "Difference is absolute.",
      seriesAName: "Firefighters <40",
      seriesBName: "Firefighters ≥40",

      // Axis range
      minValue: 0,
      maxValue: 100,

      // Tick labels shown across the top
      ticks: [0, 20, 40, 60, 80, 100],

      // Difference text suffix
      diffSuffix: "pts",

      // Number formatting
      decimals: 1,

      /*
        Label placement behavior:
        If the two points are very close, one label can go above and one below.
        Threshold is measured in data units.
      */
      compactThreshold: 6
    };

    /*
      ============================================================
      DATA SECTION
      ------------------------------------------------------------
      REQUIRED FIELDS:
      - label   : category name
      - seriesA : first group value
      - seriesB : second group value

      Replace this whole array for future charts.
      ============================================================
    */
    const DATA = [
      { label: "CAD/Ischemic", seriesA: 48.0, seriesB: 83.2 },
      { label: "Valvular",     seriesA: 10.0, seriesB: 0.8 },
      { label: "iLVH",         seriesA: 12.0, seriesB: 5.3 },
      { label: "CM NOS",       seriesA: 6.0,  seriesB: 0.0 },
      { label: "Aortic",       seriesA: 4.0,  seriesB: 2.0 },
      { label: "Mitral",       seriesA: 6.0,  seriesB: 2.0 },
      { label: "Arrhythmia",   seriesA: 20.0, seriesB: 17.9 },
      { label: "Myocarditis",  seriesA: 4.0,  seriesB: 0.8 },
      { label: "Pericarditis", seriesA: 2.0,  seriesB: 0.8 },
      { label: "Congenital",   seriesA: 4.0,  seriesB: 2.0 },
      { label: "Other",        seriesA: 14.0, seriesB: 13.4 },
      { label: "Normal",       seriesA: 48.0, seriesB: 32.4 }
    ];

    /*
      ============================================================
      RENDERING LOGIC
      ------------------------------------------------------------
      Usually you do not need to edit below this line.
      ============================================================
    */

    const chart = document.getElementById("chart");
    const axisScale = document.getElementById("axisScale");
    const legend = document.getElementById("legend");

    // Apply text content from config
    document.getElementById("chartTitle").textContent = CONFIG.title;
    document.getElementById("chartSubtitle").textContent = CONFIG.subtitle;
    document.getElementById("leftHeader").textContent = CONFIG.leftHeader;
    document.getElementById("rightHeader").textContent = CONFIG.rightHeader;
    document.getElementById("footerNote").textContent = CONFIG.footerNote;

    // Build legend
    legend.innerHTML = `
      <div class="legend-item series-a">
        <span class="legend-dot series-a"></span>${CONFIG.seriesAName}
      </div>
      <div class="legend-item series-b">
        <span class="legend-dot series-b"></span>${CONFIG.seriesBName}
      </div>
    `;

    // Build axis
    axisScale.style.gridTemplateColumns = `repeat(${CONFIG.ticks.length}, 1fr)`;

    CONFIG.ticks.forEach((tickValue) => {
      const tick = document.createElement("div");
      tick.className = "axis-tick";
      tick.textContent = `${tickValue}%`;
      axisScale.appendChild(tick);
    });

    // Make the vertical grid lines tall enough for current number of rows
    const approxGridHeight = Math.max(240, DATA.length * (45 + 12) + 80);
    axisScale.style.setProperty("--gridline-height", `${approxGridHeight}px`);

    // Convert a value to a % position along the plot width
    function valueToPercent(value) {
      const clamped = Math.max(CONFIG.minValue, Math.min(CONFIG.maxValue, value));
      const normalized = (clamped - CONFIG.minValue) / (CONFIG.maxValue - CONFIG.minValue);
      return `${normalized * 100}%`;
    }

    // Format numbers consistently
    function fmt(value) {
      return Number(value).toFixed(CONFIG.decimals);
    }

    DATA.forEach((d) => {
      const row = document.createElement("div");
      row.className = "row";

      const a = Number(d.seriesA);
      const b = Number(d.seriesB);

      // Absolute difference
      const diff = Math.abs(b - a);

      // Connector runs from smaller value to larger value
      const left = Math.min(a, b);
      const width = Math.abs(b - a);

      // If values are very close, stagger labels vertically
      const compactLabels = width < CONFIG.compactThreshold;
      const aAbove = a <= b;
      const bAbove = !aAbove;

      const aTransform = compactLabels
        ? (aAbove ? "translate(-50%, -32px)" : "translate(-50%, 10px)")
        : "translate(-50%, -30px)";

      const bTransform = compactLabels
        ? (bAbove ? "translate(-50%, -32px)" : "translate(-50%, 10px)")
        : "translate(-50%, -30px)";

      row.innerHTML = `
        <div class="label">${d.label}</div>

        <div class="row-card">
          <div class="plot">
            <div class="connector"
                 style="left:${valueToPercent(left)}; width:${valueToPercent(width).replace('%','')}%;"></div>

            <div class="pill series-a"
                 style="left:${valueToPercent(a)}; transform:${aTransform};">
              ${fmt(a)}
            </div>

            <div class="pill series-b"
                 style="left:${valueToPercent(b)}; transform:${bTransform};">
              ${fmt(b)}
            </div>

            <div class="point series-a" style="left:${valueToPercent(a)};"></div>
            <div class="point series-b" style="left:${valueToPercent(b)};"></div>
          </div>
        </div>

        <div class="diff">${fmt(diff)} ${CONFIG.diffSuffix}</div>
      `;

      chart.appendChild(row);
    });
  </script>
</body>
</html>
